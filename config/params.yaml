data:
  raw_path: "data/raw/WA_Fn-UseC-Telco-Customer-Churn.csv"
  
  test_size: 0.2
  
  random_state: 42

model:
  # Nombre del modelo a entrenar. Opciones: "RandomForest", "LogisticRegression", "SVM"
  name: "RandomForest"
  
  n_estimators: 100      
  max_depth: 10          
  
  max_iter: 1000        
  class_weight: "balanced"  
  
  C: 1.0                 
  kernel: "rbf"          

paths:
  model_save: "models/model.pkl"